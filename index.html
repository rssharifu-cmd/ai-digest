<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal — Your Personalized AI Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2eb; --ink: #1a1612; --accent: #c8410a;
      --surface: #edeae2; --border: rgba(26,22,18,0.12); --muted: #7a7268;
      --serif: 'Playfair Display', Georgia, serif; --sans: 'DM Sans', system-ui, sans-serif;
    }
    html, body { height:100%; background:var(--bg); color:var(--ink); font-family:var(--sans); overflow-x:hidden; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
    #app { display:flex; flex-direction:column; min-height:100vh; }

    /* HEADER */
    .header { padding:16px 28px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; background:rgba(245,242,235,0.96); backdrop-filter:blur(12px); }
    .logo { display:flex; align-items:center; gap:12px; }
    .logo-mark { width:34px; height:34px; background:var(--ink); color:var(--bg); display:flex; align-items:center; justify-content:center; font-family:var(--serif); font-size:16px; font-style:italic; border-radius:2px; }
    .logo-name { font-family:var(--serif); font-size:19px; letter-spacing:-0.5px; }
    .logo-tag { font-size:9px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; }
    .header-right { display:flex; align-items:center; gap:8px; }
    .phase-pill { padding:4px 12px; border-radius:20px; background:var(--surface); border:1px solid var(--border); font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; transition:all .3s; }
    .phase-pill.active { background:var(--ink); color:var(--bg); border-color:var(--ink); }
    .hbtn { padding:7px 14px; background:transparent; font-family:var(--sans); font-size:11px; cursor:pointer; border:1px solid var(--border); color:var(--muted); border-radius:2px; transition:all .15s; }
    .hbtn:hover { border-color:var(--ink); color:var(--ink); }

    /* CHAT */
    .chat-view { flex:1; display:flex; flex-direction:column; }
    .chat-body { flex:1; overflow-y:auto; padding:40px 24px; }
    .chat-inner { max-width:660px; margin:0 auto; }

    .msg { margin-bottom:24px; display:flex; gap:14px; animation:fadeUp .3s ease; }
    .msg.user { justify-content:flex-end; }
    .bot-avatar { width:30px; height:30px; background:var(--ink); color:var(--bg); display:flex; align-items:center; justify-content:center; font-family:var(--serif); font-size:13px; font-style:italic; border-radius:50%; flex-shrink:0; margin-top:2px; }
    .bot-bubble { max-width:calc(100% - 44px); font-size:15px; line-height:1.85; color:#2d2820; font-weight:300; }
    .user-bubble { max-width:75%; padding:13px 18px; background:var(--ink); color:var(--bg); font-size:14px; line-height:1.7; border-radius:18px 18px 4px 18px; font-weight:300; }

    /* Typing indicator */
    .typing { display:flex; gap:14px; align-items:center; margin-bottom:24px; }
    .typing-dots { display:flex; gap:5px; padding:12px 0; }
    .dot { width:6px; height:6px; background:var(--muted); border-radius:50%; animation:blink 1.4s ease infinite; }
    .dot:nth-child(2){animation-delay:.2s;} .dot:nth-child(3){animation-delay:.4s;}

    /* Accept panel */
    .accept-panel { margin-top:20px; padding:20px 24px; background:white; border:1px solid var(--border); border-radius:4px; }
    .accept-panel p { font-size:13px; color:var(--muted); margin-bottom:16px; line-height:1.6; }
    .accept-btns { display:flex; gap:10px; flex-wrap:wrap; }
    .btn-accept { padding:12px 28px; background:var(--accent); border:none; color:#fff; cursor:pointer; font-family:var(--sans); font-size:13px; font-weight:500; border-radius:2px; }
    .btn-accept:hover { background:#a33508; }
    .btn-more { padding:12px 20px; background:transparent; border:1px solid var(--border); color:var(--ink); cursor:pointer; font-family:var(--sans); font-size:13px; border-radius:2px; }

    /* Input */
    .input-area { border-top:1px solid var(--border); padding:18px 24px; background:rgba(245,242,235,0.97); backdrop-filter:blur(8px); position:sticky; bottom:0; }
    .input-inner { max-width:660px; margin:0 auto; }
    .input-row { display:flex; gap:10px; align-items:flex-end; }
    textarea { flex:1; padding:13px 18px; background:white; border:1px solid var(--border); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.6; resize:none; outline:none; min-height:50px; border-radius:25px; transition:border-color .15s; font-weight:300; }
    textarea:focus { border-color:var(--ink); }
    textarea::placeholder { color:var(--muted); }
    .send-btn { width:50px; height:50px; background:var(--ink); border:none; color:var(--bg); cursor:pointer; font-size:20px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:background .15s; }
    .send-btn:hover { background:#2d2820; }
    .send-btn:disabled { background:var(--border); cursor:not-allowed; }

    /* LOCKED */
    .locked-view { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 24px; text-align:center; }
    .locked-hero { font-family:var(--serif); font-size:clamp(42px,7vw,70px); line-height:1.1; margin-bottom:16px; letter-spacing:-2px; }
    .locked-hero em { font-style:italic; color:var(--accent); }
    .locked-sub { font-size:15px; color:var(--muted); margin-bottom:44px; font-weight:300; }
    .locked-card { width:100%; max-width:500px; background:white; border:1px solid var(--border); padding:28px; margin-bottom:28px; text-align:left; border-radius:4px; box-shadow:0 4px 24px rgba(26,22,18,0.06); }
    .locked-card-title { font-size:9px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:18px; }
    .locked-row { display:flex; gap:16px; padding:11px 0; border-bottom:1px solid var(--border); }
    .locked-row:last-child { border-bottom:none; }
    .locked-label { font-size:11px; color:var(--muted); min-width:90px; padding-top:1px; flex-shrink:0; }
    .locked-val { font-size:13px; color:var(--ink); flex:1; line-height:1.5; }
    .btn-primary { padding:15px 36px; background:var(--ink); border:none; color:var(--bg); cursor:pointer; font-family:var(--sans); font-size:13px; font-weight:500; border-radius:2px; transition:background .15s; }
    .btn-primary:hover { background:#2d2820; }
    .countdown { display:flex; align-items:center; gap:8px; margin-bottom:28px; padding:8px 18px; background:var(--surface); border:1px solid var(--border); border-radius:20px; font-size:12px; color:var(--muted); }
    .cdot { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:pulse 2s ease infinite; }

    /* DIGEST */
    .digest-view { flex:1; padding:36px 24px; max-width:700px; width:100%; margin:0 auto; }
    .digest-eyebrow { font-size:9px; letter-spacing:3px; color:var(--accent); text-transform:uppercase; margin-bottom:8px; }
    .digest-title { font-family:var(--serif); font-size:30px; margin-bottom:4px; letter-spacing:-0.5px; }
    .digest-date { font-size:13px; color:var(--muted); font-weight:300; margin-bottom:24px; }
    .digest-content { background:white; border:1px solid var(--border); padding:36px; font-size:14px; line-height:2; color:#2d2820; white-space:pre-wrap; word-break:break-word; margin-bottom:18px; border-radius:4px; font-weight:300; box-shadow:0 4px 20px rgba(26,22,18,0.06); }
    .digest-btns { display:flex; gap:10px; }
    .btn-outline { padding:10px 22px; background:transparent; border:1px solid var(--border); color:var(--ink); cursor:pointer; font-family:var(--sans); font-size:12px; border-radius:2px; transition:all .15s; }
    .btn-outline:hover { border-color:var(--ink); }
    .spinner { width:30px; height:30px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:70px auto 14px; }
    .gen-text { text-align:center; font-size:11px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; animation:pulse 1.5s ease infinite; }

    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    @media(max-width:600px) {
      .header{padding:14px 16px;} .chat-body{padding:24px 16px;}
      .input-area{padding:14px 16px;} .digest-view{padding:24px 16px;}
      .locked-view{padding:40px 16px;}
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">
      <div class="logo-mark">S</div>
      <div>
        <div class="logo-name">Signal</div>
        <div class="logo-tag">AI Intelligence</div>
      </div>
    </div>
    <div class="header-right">
      <span class="phase-pill active" id="phase-label">Conversation</span>
      <button class="hbtn" onclick="resetAll()">Reset</button>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat-view" class="chat-view">
    <div class="chat-body" id="chat-body">
      <div class="chat-inner" id="chat-inner"></div>
    </div>
    <div class="input-area" id="input-area" style="display:none;">
      <div class="input-inner">
        <div class="input-row">
          <textarea id="user-input" rows="1" placeholder="Type your message..." onkeydown="handleKey(event)" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()">→</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LOCKED -->
  <div id="locked-view" class="locked-view" style="display:none;">
    <div class="countdown"><div class="cdot"></div><span id="days-text"></span></div>
    <h1 class="locked-hero">Your daily<br/><em>signal</em><br/>is ready.</h1>
    <p class="locked-sub">Digest configured. Check your inbox each day.</p>
    <div class="locked-card" id="profile-card"></div>
    <button class="btn-primary" onclick="showDigest()">Preview today's digest →</button>
  </div>

  <!-- DIGEST -->
  <div id="digest-view" class="digest-view" style="display:none;">
    <p class="digest-eyebrow">Daily Intelligence</p>
    <h2 class="digest-title">Your Digest</h2>
    <p class="digest-date" id="digest-date"></p>
    <div id="digest-body"></div>
  </div>
</div>

<script>
var chatHistory = [];
var userProfile = null;
var waitingForAccept = false;
var isLoading = false;

window.onload = function() {
  // Check if already locked
  var locked = localStorage.getItem('sig_locked');
  var saved = localStorage.getItem('sig_profile');
  if (locked && saved) {
    var lockDate = new Date(locked);
    if (new Date() < lockDate) {
      userProfile = JSON.parse(saved);
      showLockedView(lockDate);
      return;
    }
  }
  // Start conversation
  document.getElementById('input-area').style.display = 'block';
  startConversation();
};

function startConversation() {
  // First message from AI
  callAI([{ role: "user", content: "Hi" }], true);
}

async function callAI(messages, isFirst) {
  setLoading(true);
  showTyping();

  try {
    var res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: messages, mode: 'onboarding' })
    });

    hideTyping();

    if (!res.ok) {
      var err = await res.json();
      addBotMessage("I'm having trouble connecting right now. Please try again in a moment.");
      setLoading(false);
      return;
    }

    var data = await res.json();
    chatHistory = messages;

    if (data.profileReady && data.profile) {
      // AI has enough info — show summary + accept
      userProfile = data.profile;
      addBotMessage(data.content);
      setTimeout(showAcceptPanel, 500);
      document.getElementById('input-area').style.display = 'none';
    } else {
      addBotMessage(data.content);
      // Add assistant message to history
      chatHistory.push({ role: 'assistant', content: data.content });
    }

  } catch(e) {
    hideTyping();
    addBotMessage("Connection error. Please check your internet and try again.");
  }

  setLoading(false);
}

function sendMessage() {
  var inp = document.getElementById('user-input');
  var val = inp.value.trim();
  if (!val || isLoading) return;

  inp.value = '';
  inp.style.height = 'auto';
  addUserMessage(val);

  // Build full conversation
  var messages = chatHistory.concat([{ role: 'user', content: val }]);
  callAI(messages, false);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function addBotMessage(text) {
  var inner = document.getElementById('chat-inner');
  var m = document.createElement('div');
  m.className = 'msg bot';
  m.innerHTML = '<div class="bot-avatar">S</div><div class="bot-bubble">' + text.replace(/\n/g, '<br/>') + '</div>';
  inner.appendChild(m);
  scroll();
}

function addUserMessage(text) {
  var inner = document.getElementById('chat-inner');
  var m = document.createElement('div');
  m.className = 'msg user';
  m.innerHTML = '<div class="user-bubble">' + escapeHtml(text) + '</div>';
  inner.appendChild(m);
  scroll();
}

function showTyping() {
  var inner = document.getElementById('chat-inner');
  var t = document.createElement('div');
  t.className = 'typing'; t.id = 'typing-indicator';
  t.innerHTML = '<div class="bot-avatar">S</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  inner.appendChild(t);
  scroll();
}

function hideTyping() {
  var t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function showAcceptPanel() {
  var inner = document.getElementById('chat-inner');
  var panel = document.createElement('div');
  panel.className = 'accept-panel';
  panel.id = 'accept-panel';
  panel.innerHTML =
    '<p>I now have a clear picture of who you are and what you need. Ready to lock this in and start receiving your daily digest?</p>' +
    '<div class="accept-btns">' +
      '<button class="btn-accept" onclick="handleAccept()">Yes, start my digest ✓</button>' +
      '<button class="btn-more" onclick="continueChat()">I want to add something</button>' +
    '</div>';

  var msgWrap = document.createElement('div');
  msgWrap.style.maxWidth = '660px';
  msgWrap.style.margin = '0 auto 24px';
  msgWrap.appendChild(panel);

  var chatBody = document.getElementById('chat-body');
  var chatInner = document.getElementById('chat-inner');
  chatInner.appendChild(msgWrap);
  scroll();
}

function continueChat() {
  var panel = document.getElementById('accept-panel');
  if (panel) panel.parentElement.remove();
  document.getElementById('input-area').style.display = 'block';
  document.getElementById('user-input').focus();
  addBotMessage("Of course! What else would you like me to know?");
  chatHistory.push({ role: 'assistant', content: "Of course! What else would you like me to know?" });
}

function handleAccept() {
  var panel = document.getElementById('accept-panel');
  if (panel) panel.parentElement.remove();
  document.getElementById('input-area').style.display = 'none';

  addBotMessage("Perfect! 🎉 You're all set.\n\nYour personalized digest is configured. I'll see you in your inbox — starting from " + (userProfile.delivery || 'your scheduled time') + ".\n\nThis profile is locked for 7 days. Talk soon!");

  var lock = new Date();
  lock.setDate(lock.getDate() + 7);
  localStorage.setItem('sig_locked', lock.toISOString());
  localStorage.setItem('sig_profile', JSON.stringify(userProfile));

  setTimeout(function() { showLockedView(lock); }, 2500);
}

function showLockedView(lockDate) {
  document.getElementById('chat-view').style.display = 'none';
  document.getElementById('locked-view').style.display = 'flex';
  document.getElementById('phase-label').textContent = 'Active';

  var days = Math.max(0, Math.ceil((lockDate - new Date()) / 86400000));
  document.getElementById('days-text').textContent = days + ' day' + (days !== 1 ? 's' : '') + ' until next update — ' + lockDate.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });

  var p = userProfile || {};
  var rows = [
    ['Profession', p.profession],
    ['Goal', p.goal],
    ['Delivery', p.delivery],
    ['Email', p.email]
  ].filter(function(r) { return r[1]; });

  document.getElementById('profile-card').innerHTML =
    '<p class="locked-card-title">Your Profile</p>' +
    rows.map(function(r) {
      var v = (r[1] || '').slice(0, 80) + ((r[1] || '').length > 80 ? '...' : '');
      return '<div class="locked-row"><span class="locked-label">' + r[0] + '</span><span class="locked-val">' + v + '</span></div>';
    }).join('');
}

function showDigest() {
  document.getElementById('locked-view').style.display = 'none';
  document.getElementById('digest-view').style.display = 'block';
  document.getElementById('phase-label').textContent = 'Digest';
  document.getElementById('digest-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  generateDigest();
}

async function generateDigest() {
  var body = document.getElementById('digest-body');
  body.innerHTML = '<div class="spinner"></div><p class="gen-text">Generating your digest...</p>';

  try {
    var res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        mode: 'digest',
        profile: userProfile,
        messages: [{ role: 'user', content: 'Generate my digest' }]
      })
    });

    if (res.ok) {
      var data = await res.json();
      body.innerHTML =
        '<div class="digest-content">' + data.content.replace(/\n/g, '<br/>') + '</div>' +
        '<div class="digest-btns"><button class="btn-outline" onclick="generateDigest()">↻ Refresh</button><button class="btn-outline" onclick="backToLocked()">← Back</button></div>';
      return;
    }
  } catch(e) { console.log(e); }

  // Fallback
  var today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  body.innerHTML =
    '<div class="digest-content">━━━━━━━━━━━━━━━━━━━━━━━━━━━━<br/>YOUR DAILY DIGEST · ' + today + '<br/>━━━━━━━━━━━━━━━━━━━━━━━━━━━━<br/><br/>⚠️ Could not connect to AI. Please check that GROK_API_KEY is set in Vercel Environment Variables and redeploy.</div>' +
    '<div class="digest-btns"><button class="btn-outline" onclick="generateDigest()">↻ Try Again</button><button class="btn-outline" onclick="backToLocked()">← Back</button></div>';
}

function backToLocked() {
  document.getElementById('digest-view').style.display = 'none';
  document.getElementById('locked-view').style.display = 'flex';
}

function setLoading(val) {
  isLoading = val;
  var btn = document.getElementById('send-btn');
  if (btn) btn.disabled = val;
}

function scroll() {
  setTimeout(function() {
    var b = document.getElementById('chat-body');
    if (b) b.scrollTop = b.scrollHeight;
  }, 60);
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function resetAll() {
  localStorage.removeItem('sig_locked');
  localStorage.removeItem('sig_profile');
  chatHistory = []; userProfile = null; waitingForAccept = false; isLoading = false;
  document.getElementById('chat-inner').innerHTML = '';
  document.getElementById('input-area').style.display = 'block';
  document.getElementById('chat-view').style.display = 'flex';
  document.getElementById('locked-view').style.display = 'none';
  document.getElementById('digest-view').style.display = 'none';
  document.getElementById('phase-label').textContent = 'Conversation';
  var inp = document.getElementById('user-input');
  if (inp) { inp.value = ''; inp.style.height = 'auto'; }
  startConversation();
}
</script>
</body>
</html>
